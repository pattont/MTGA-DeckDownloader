name: Build installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from pyproject.toml
        required: true
        default: "0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install application
        run: python -m pip install -e .

      - name: Run tests and diagnostics
        run: |
          python -m unittest discover
          mtga-deck-downloader --diagnose

  windows:
    name: Windows x64 installer
    needs: test
    runs-on: windows-latest
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $version = "${{ inputs.version }}"
          }
          Add-Content -Path $env:GITHUB_ENV -Value "APP_VERSION=$version"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -e ".[release]"

      - name: Validate version
        shell: pwsh
        run: |
          $actual = python -c "from importlib.metadata import version; print(version('mtga-deck-downloader'))"
          if ($actual -ne $env:APP_VERSION) {
            throw "Tag/input version $env:APP_VERSION does not match pyproject version $actual"
          }

      - name: Build PyInstaller payload
        run: python packaging/build_payload.py --version $env:APP_VERSION

      - name: Sign application executable when configured
        shell: pwsh
        run: ./packaging/windows/sign.ps1 -Path "dist/pyinstaller/mtga-deck-downloader/mtga-deck-downloader.exe"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: ./packaging/windows/build_installer.ps1 -Version $env:APP_VERSION

      - name: Sign installer when configured
        shell: pwsh
        run: ./packaging/windows/sign.ps1 -Path "dist/release/*.exe"

      - name: Generate Windows checksum
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem "dist/release" -Filter "*.exe")
          if ($installers.Count -ne 1) {
            throw "Expected exactly one Windows installer, found $($installers.Count)"
          }
          $hash = (Get-FileHash -Algorithm SHA256 $installers[0].FullName).Hash.ToLowerInvariant()
          $checksum = "$hash  $($installers[0].Name)`n"
          [IO.File]::WriteAllText(
            "dist/release/SHA256SUMS-windows-x64.txt",
            $checksum,
            [Text.Encoding]::ASCII
          )

      - name: Upload Windows installer and checksum
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows-x64
          path: |
            dist/release/*.exe
            dist/release/SHA256SUMS-windows-x64.txt
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.arch }} DMG
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    env:
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            version="${{ github.ref_name }}"
            version="${version#v}"
          else
            version="${{ inputs.version }}"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build dependencies
        run: python -m pip install -e ".[release]"

      - name: Validate version and architecture
        shell: bash
        run: |
          actual="$(python -c "from importlib.metadata import version; print(version('mtga-deck-downloader'))")"
          [[ "$actual" == "$APP_VERSION" ]] || {
            echo "Tag/input version $APP_VERSION does not match pyproject version $actual" >&2
            exit 1
          }
          [[ "$(uname -m)" == "${{ matrix.arch == 'x64' && 'x86_64' || 'arm64' }}" ]]

      - name: Import Apple signing certificate when configured
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        shell: bash
        run: |
          certificate_path="$RUNNER_TEMP/mtga-deck-downloader.p12"
          keychain_path="$RUNNER_TEMP/mtga-deck-downloader.keychain-db"
          keychain_password="temporary-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          CERTIFICATE_PATH="$certificate_path" python -c "import base64, os, pathlib; pathlib.Path(os.environ['CERTIFICATE_PATH']).write_bytes(base64.b64decode(os.environ['APPLE_CERTIFICATE_BASE64']))"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          echo "SIGNING_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          rm -f "$certificate_path"

      - name: Build PyInstaller payload
        run: python packaging/build_payload.py --version "$APP_VERSION"

      - name: Build macOS app and DMG
        run: packaging/macos/build_dmg.sh "$APP_VERSION"

      - name: Notarize DMG when configured
        if: env.MACOS_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_APP_PASSWORD != '' && env.APPLE_TEAM_ID != ''
        shell: bash
        run: |
          dmg="$(find dist/release -maxdepth 1 -name '*.dmg' -print -quit)"
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"

      - name: Generate macOS checksum
        shell: bash
        run: |
          dmg="$(find dist/release -maxdepth 1 -name '*.dmg' -print -quit)"
          [[ -n "$dmg" ]] || {
            echo "No DMG found for checksum generation." >&2
            exit 1
          }
          (
            cd dist/release
            shasum -a 256 "$(basename "$dmg")" > "SHA256SUMS-macos-${{ matrix.arch }}.txt"
          )

      - name: Upload macOS DMG and checksum
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-${{ matrix.arch }}
          path: |
            dist/release/*.dmg
            dist/release/SHA256SUMS-macos-${{ matrix.arch }}.txt
          if-no-files-found: error

      - name: Delete temporary signing keychain
        if: always()
        shell: bash
        run: |
          if [[ -n "${SIGNING_KEYCHAIN_PATH:-}" && -f "$SIGNING_KEYCHAIN_PATH" ]]; then
            security delete-keychain "$SIGNING_KEYCHAIN_PATH"
          fi

  release:
    name: Create draft GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - windows
      - macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd release-assets
          rm -f SHA256SUMS-*.txt
          sha256sum *.exe *.dmg > SHA256SUMS.txt

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --generate-notes \
              --notes "These installers are currently unsigned. Windows SmartScreen and macOS Gatekeeper may show a warning. See the repository README for verification and launch instructions." \
              --title "MTGA Deck Downloader $GITHUB_REF_NAME"
          fi
          gh release upload "$GITHUB_REF_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
