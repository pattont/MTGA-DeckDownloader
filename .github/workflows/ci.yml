name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install application
        run: python -m pip install -e .

      - name: Run tests
        run: python -m unittest discover

      - name: Run offline diagnostics
        run: mtga-deck-downloader --diagnose
